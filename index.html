<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buoy Data — NOAA NDBC</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #06001a;
      --bg-card:   #0d0030;
      --bg-chart:  #080020;
      --border:    #3a0060;
      --text:      #f0e6ff;
      --muted:     #9966cc;
      --accent:    #FF2D78;
      --c1:        #00F5FF;
      --c2:        #FF2D78;
      --c3:        #39FF14;
      --cw:        #FFD600;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(0,245,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      color: var(--text);
      font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Navbar ─────────────────────────────────────────────────────── */
    .navbar {
      background: rgba(6, 0, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,245,255,0.12);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #00F5FF 0%, #FF2D78 50%, #FFD600 100%);
      opacity: .7;
    }

    .brand {
      font-family: 'Righteous', cursive;
      font-size: 22px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      text-decoration: none;
      background: linear-gradient(135deg, #00F5FF 0%, #FF2D78 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(0,245,255,0.45));
    }

    .brand-wave {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .brand-wave span {
      display: block;
      height: 2.5px;
      border-radius: 2px;
    }
    .brand-wave span:nth-child(1) { width: 22px; background: #00F5FF; box-shadow: 0 0 6px #00F5FF; transform: scaleX(.75); transform-origin: left; }
    .brand-wave span:nth-child(2) { width: 22px; background: #CC66FF; box-shadow: 0 0 6px #CC66FF; }
    .brand-wave span:nth-child(3) { width: 16px; background: #FF2D78; box-shadow: 0 0 6px #FF2D78; transform: scaleX(.65); transform-origin: left; }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .nav-label {
      font-size: 12px;
      color: var(--muted);
    }

    select, input[type="number"] {
      background: rgba(0,0,0,0.5);
      color: var(--text);
      border: 1px solid rgba(0,245,255,0.22);
      border-radius: 4px;
      padding: 5px 9px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #00F5FF;
      box-shadow: 0 0 10px rgba(0,245,255,0.35);
    }
    select option { background: #0d0030; }

    .btn {
      background: transparent;
      color: #FF2D78;
      border: 1.5px solid #FF2D78;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Exo 2', inherit;
      text-transform: uppercase;
      letter-spacing: .5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-shadow: 0 0 8px rgba(255,45,120,.7);
      box-shadow: 0 0 12px rgba(255,45,120,.3), inset 0 0 12px rgba(255,45,120,.05);
      transition: box-shadow .2s, background .2s;
    }
    .btn:hover {
      background: rgba(255,45,120,.12);
      box-shadow: 0 0 22px rgba(255,45,120,.6), inset 0 0 16px rgba(255,45,120,.1);
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Main ────────────────────────────────────────────────────────── */
    .main {
      max-width: 1360px;
      margin: 0 auto;
      padding: 20px 18px 32px;
    }

    /* ── Status bar ──────────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #39FF14;
      box-shadow: 0 0 8px #39FF14;
      flex-shrink: 0;
    }
    .dot.spin { background: #00F5FF; box-shadow: 0 0 10px #00F5FF; animation: blink 1s ease-in-out infinite; }
    .dot.err  { background: #FF2D78; box-shadow: 0 0 10px #FF2D78; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Conditions grid ─────────────────────────────────────────────── */
    .cond-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .cond-card {
      background: var(--bg-card);
      border: 1px solid rgba(180,100,255,0.18);
      border-left: 3px solid rgba(180,100,255,0.3);
      border-radius: 6px;
      padding: 12px 14px;
      transition: box-shadow .2s;
    }
    .cond-card:hover { box-shadow: 0 0 16px rgba(180,100,255,0.12); }

    .cond-card.c1 { border-left-color: #00F5FF; box-shadow: -2px 0 14px rgba(0,245,255,0.18); }
    .cond-card.c2 { border-left-color: #FF2D78; box-shadow: -2px 0 14px rgba(255,45,120,0.18); }
    .cond-card.c3 { border-left-color: #39FF14; box-shadow: -2px 0 14px rgba(57,255,20,0.18); }
    .cond-card.cw { border-left-color: #FFD600; box-shadow: -2px 0 14px rgba(255,214,0,0.18); }

    .cond-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 5px;
      font-family: 'Righteous', cursive;
    }
    .cond-val {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .cond-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Shared legend ───────────────────────────────────────────────── */
    .legend-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 18px;
      padding: 9px 16px;
      background: var(--bg-card);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 12px;
      box-shadow: 0 0 20px rgba(0,245,255,0.04), inset 0 0 30px rgba(0,245,255,0.02);
    }
    .legend-hd {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: 'Righteous', cursive;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text);
    }
    .legend-swatch {
      width: 26px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    #legH  .legend-swatch { box-shadow: 0 0 6px #00F5FF; }
    #legDP .legend-swatch { box-shadow: 0 0 6px #FF2D78; }
    #legAP .legend-swatch { box-shadow: 0 0 6px #39FF14; }
    #legD  .legend-swatch { box-shadow: 0 0 6px #FFD600; }

    /* ── Charts ──────────────────────────────────────────────────────── */
    .chart-section { margin-bottom: 18px; }

    .chart-hdr {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 2px;
      margin-bottom: 6px;
    }
    .chart-title {
      font-family: 'Righteous', cursive;
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00F5FF;
      text-shadow: 0 0 12px rgba(0,245,255,0.5);
    }
    .chart-unit { font-size: 11px; color: var(--muted); }

    .chart-box {
      background: var(--bg-chart);
      border: 1px solid rgba(0,245,255,0.12);
      border-radius: 6px;
      padding: 14px 16px 10px;
      position: relative;
      height: 220px;
      box-shadow: 0 0 24px rgba(0,245,255,0.04), inset 0 0 40px rgba(0,0,50,0.4);
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6,0,26,.82);
      border-radius: 6px;
      z-index: 10;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2.5px solid rgba(0,245,255,0.15);
      border-top-color: #00F5FF;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      box-shadow: 0 0 14px rgba(0,245,255,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chart-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Footer ──────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid rgba(0,245,255,0.1);
      margin-top: 8px;
    }
    footer a { color: #00F5FF; text-decoration: none; }
    footer a:hover { text-shadow: 0 0 8px #00F5FF; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      .navbar { padding: 8px 12px; }
      .main   { padding: 14px 10px 24px; }
      .cond-val { font-size: 18px; }
      .chart-box { height: 180px; }
    }
  </style>
</head>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════════════════════════ */
// NDBC realtime2 standard met file
const NDBC_URL  = 'https://www.ndbc.noaa.gov/data/realtime2/';
// CORS proxy fallback (used if direct fetch blocked)
const CORS_PROXY = 'https://corsproxy.io/?';

/* ════════════════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════════════════ */
let charts = { h: null, p: null, d: null };

/* ════════════════════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════════════════════ */
const mToFt    = v => (v == null) ? null : +(v * 3.28084).toFixed(2);
const msToMph  = v => (v == null) ? null : +(v * 2.23694).toFixed(1);
const cToF     = v => (v == null) ? null : +((v * 9 / 5) + 32).toFixed(1);

function degToCompass(deg) {
  if (deg == null || isNaN(deg)) return '--';
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];
}

/* ════════════════════════════════════════════════════════════════════════════
   NDBC FETCH + PARSE
════════════════════════════════════════════════════════════════════════════ */
async function fetchNDBC(stationId) {
  const url = `${NDBC_URL}${stationId}.txt`;
  let resp;
  try {
    resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  } catch (e) {
    // Retry via CORS proxy
    resp = await fetch(`${CORS_PROXY}${encodeURIComponent(url)}`);
    if (!resp.ok) throw new Error(`NDBC ${resp.status} for station ${stationId}`);
  }
  return resp.text();
}

function parseNDBC(text, limitDays) {
  const lines = text.trim().split('\n');

  // Identify header lines (start with #)
  const dataLines = lines.filter(l => !l.trimStart().startsWith('#') && l.trim().length > 0);

  const cutoff = Date.now() - limitDays * 86400 * 1000;

  const rows = [];
  for (const line of dataLines) {
    const cols = line.trim().split(/\s+/);
    if (cols.length < 15) continue;

    // NDBC format: YY MM DD hh mm WDIR WSPD GST WVHT DPD APD MWD PRES ATMP WTMP ...
    const yr = parseInt(cols[0]);
    const year = yr < 100 ? (yr > 50 ? 1900 + yr : 2000 + yr) : yr;
    const mo = cols[1].padStart(2,'0');
    const dy = cols[2].padStart(2,'0');
    const hh = cols[3].padStart(2,'0');
    const mn = cols[4].padStart(2,'0');
    const isoTime = `${year}-${mo}-${dy}T${hh}:${mn}:00Z`;
    const ts = new Date(isoTime).getTime();

    if (ts < cutoff) continue; // skip rows older than requested window

    const p = v => (v === 'MM' || v === '999' || v === '9999' || v === '99' || v === '99.0') ? null : parseFloat(v);

    rows.push({
      time:  isoTime,
      ts,
      wdir:  p(cols[5]),   // deg
      wspd:  p(cols[6]),   // m/s
      gst:   p(cols[7]),   // m/s
      wvht:  p(cols[8]),   // m  → convert to ft
      dpd:   p(cols[9]),   // s
      apd:   p(cols[10]),  // s
      mwd:   p(cols[11]),  // deg
      pres:  p(cols[12]),  // hPa
      atmp:  p(cols[13]),  // °C → convert to °F
      wtmp:  p(cols[14]),  // °C → convert to °F
    });
  }

  // NDBC file is newest-first; reverse to oldest-first for charts
  rows.reverse();
  return rows;
}

/* ════════════════════════════════════════════════════════════════════════════
   BUILD CHART DATA
════════════════════════════════════════════════════════════════════════════ */
function buildData(rows) {
  const times  = rows.map(r => r.time);
  const wvhtFt = rows.map(r => mToFt(r.wvht));
  const dpdS   = rows.map(r => r.dpd);
  const apdS   = rows.map(r => r.apd);
  const mwdDeg = rows.map(r => r.mwd);
  const wspdMph= rows.map(r => msToMph(r.wspd));
  const gstMph = rows.map(r => msToMph(r.gst));
  const wdirDeg= rows.map(r => r.wdir);
  const atmpF  = rows.map(r => cToF(r.atmp));
  const wtmpF  = rows.map(r => cToF(r.wtmp));

  // Most recent non-null values for conditions panel
  function last(arr) {
    for (let i = arr.length - 1; i >= 0; i--) {
      if (arr[i] != null) return arr[i];
    }
    return null;
  }

  return {
    times,
    nowStr: new Date().toISOString(),
    wvhtFt, dpdS, apdS, mwdDeg,
    wspdMph, gstMph, wdirDeg,
    atmpF, wtmpF,
    cur: {
      wvhtFt: last(wvhtFt),
      dpdS:   last(dpdS),
      apdS:   last(apdS),
      mwdDeg: last(mwdDeg),
      wspdMph:last(wspdMph),
      gstMph: last(gstMph),
      wdirDeg:last(wdirDeg),
      atmpF:  last(atmpF),
      wtmpF:  last(wtmpF),
    },
  };
}

/* ════════════════════════════════════════════════════════════════════════════
   CONDITIONS PANEL
════════════════════════════════════════════════════════════════════════════ */
function renderConditions(d) {
  const c = d.cur;

  function card(cls, label, value, sub) {
    return `<div class="cond-card ${cls}">
      <div class="cond-lbl">${label}</div>
      <div class="cond-val">${value}</div>
      ${sub ? `<div class="cond-sub">${sub}</div>` : ''}
    </div>`;
  }

  const fh = v => v != null ? `${v.toFixed(1)} ft`  : '--';
  const fp = v => v != null ? `${v.toFixed(0)}s`     : '--';
  const ft = v => v != null ? `${v.toFixed(1)}°F`    : '--';
  const fw = v => v != null ? `${v.toFixed(0)} mph`  : '--';

  let html = '';

  // Wave height
  html += card('c1', 'Wave Height', fh(c.wvhtFt),
    c.dpdS != null ? `Dom. period ${fp(c.dpdS)}` : '');

  // Dominant period
  if (c.dpdS != null) {
    html += card('c2', 'Dom. Period', fp(c.dpdS),
      c.apdS != null ? `Avg ${fp(c.apdS)}` : '');
  }

  // Wave direction
  if (c.mwdDeg != null) {
    html += card('cw', 'Wave Dir', degToCompass(c.mwdDeg),
      `${Math.round(c.mwdDeg)}° from`);
  }

  // Wind
  html += card('', 'Wind', fw(c.wspdMph),
    [
      c.wdirDeg != null ? `from ${degToCompass(c.wdirDeg)}` : '',
      c.gstMph  != null ? `gusts ${fw(c.gstMph)}` : '',
    ].filter(Boolean).join(' · '));

  // Water temp
  if (c.wtmpF != null) {
    html += card('', 'Water Temp', ft(c.wtmpF), '');
  }

  // Air temp
  if (c.atmpF != null) {
    html += card('', 'Air Temp', ft(c.atmpF), '');
  }

  document.getElementById('condGrid').innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════════════════
   CHART BUILDING
════════════════════════════════════════════════════════════════════════════ */
function pts(times, arr) {
  if (!arr) return [];
  return times.map((t, i) => ({ x: t, y: arr[i] }));
}

function ds(label, data, color) {
  return {
    label,
    data,
    borderColor:     color,
    backgroundColor: color + '20',
    borderWidth: 2.5,
    pointRadius: 0,
    pointHoverRadius: 5,
    pointHoverBackgroundColor: color,
    pointHoverBorderColor: '#fff',
    pointHoverBorderWidth: 1,
    tension: 0.35,
    spanGaps: true,
    fill: false,
  };
}

function baseOptions(nowStr, yExtra, tooltipLabel) {
  return {
    responsive:           true,
    maintainAspectRatio:  false,
    animation:            { duration: 400 },
    interaction:          { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor:  'rgba(6,0,26,0.97)',
        borderColor:      'rgba(0,245,255,0.35)',
        borderWidth:      1,
        titleColor:       '#00F5FF',
        bodyColor:        '#c0a0ff',
        padding:          10,
        callbacks: {
          title(ctx) {
            if (!ctx.length) return '';
            const raw = ctx[0].raw;
            if (raw?.x) {
              return new Date(raw.x).toLocaleString('en-US', {
                timeZone: 'UTC',
                weekday: 'short', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
              });
            }
            return ctx[0].label || '';
          },
          label: tooltipLabel,
        },
      },
      annotation: {
        annotations: {
          nowLine: {
            type:        'line',
            xMin:        nowStr,
            xMax:        nowStr,
            borderColor: 'rgba(255,45,120,.65)',
            borderWidth: 1.5,
            borderDash:  [5, 4],
            label: {
              content:         'NOW',
              display:         true,
              position:        'start',
              backgroundColor: 'rgba(255,45,120,.18)',
              color:           '#FF2D78',
              font:            { size: 9, weight: 'bold', family: "'Righteous', cursive" },
              padding:         { x: 5, y: 3 },
            },
          },
        },
      },
    },
    scales: {
      x: {
        type: 'time',
        time: {
          tooltipFormat: 'MMM d, HH:mm',
          displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d' },
        },
        grid:  { color: 'rgba(100,0,180,0.28)' },
        ticks: {
          color: '#9966cc',
          maxRotation: 0,
          autoSkip:    true,
          maxTicksLimit: 8,
        },
      },
      y: {
        grid:  { color: 'rgba(100,0,180,0.28)' },
        ticks: { color: '#9966cc' },
        ...yExtra,
      },
    },
  };
}

function makeChart(id, datasets, options) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: { datasets },
    options,
  });
}

function buildCharts(d) {
  const { times, nowStr } = d;

  Object.values(charts).forEach(c => c && c.destroy());

  // ── Height chart ──────────────────────────────────────────────────────────
  charts.h = makeChart('hChart',
    [ds('Wave Height', pts(times, d.wvhtFt), '#00F5FF')],
    baseOptions(nowStr, {
      beginAtZero: true,
      ticks: { color: '#9966cc', callback: v => `${v} ft` },
    }, ctx => {
      const v = ctx.raw?.y;
      return v != null ? `Wave Ht: ${v.toFixed(1)} ft` : null;
    })
  );

  // ── Period chart ──────────────────────────────────────────────────────────
  charts.p = makeChart('pChart',
    [
      ds('Dom. Period', pts(times, d.dpdS), '#FF2D78'),
      ds('Avg Period',  pts(times, d.apdS), '#39FF14'),
    ],
    baseOptions(nowStr, {
      beginAtZero: true,
      ticks: { color: '#9966cc', callback: v => `${v}s` },
    }, ctx => {
      const v = ctx.raw?.y;
      return v != null ? `${ctx.dataset.label}: ${v.toFixed(0)}s` : null;
    })
  );

  // ── Direction chart ───────────────────────────────────────────────────────
  const COMPASS_TICKS = { 0:'N', 45:'NE', 90:'E', 135:'SE', 180:'S', 225:'SW', 270:'W', 315:'NW', 360:'N' };

  charts.d = makeChart('dChart',
    [ds('Wave Dir', pts(times, d.mwdDeg), '#FFD600')],
    baseOptions(nowStr, {
      min: 0,
      max: 360,
      ticks: {
        color: '#9966cc',
        stepSize: 45,
        callback: v => COMPASS_TICKS[v] !== undefined ? `${COMPASS_TICKS[v]} ${v}°` : `${v}°`,
      },
    }, ctx => {
      const v = ctx.raw?.y;
      if (v == null) return null;
      const deg = Math.round(((v % 360) + 360) % 360);
      return `Wave Dir: ${deg}° (${degToCompass(deg)})`;
    })
  );

  syncCrosshair([charts.h, charts.p, charts.d]);
}

/* ════════════════════════════════════════════════════════════════════════════
   CROSSHAIR SYNC
════════════════════════════════════════════════════════════════════════════ */
function syncCrosshair(chartList) {
  chartList.forEach(source => {
    const canvas = source.canvas;

    canvas.addEventListener('mousemove', evt => {
      const elements = source.getElementsAtEventForMode(evt, 'index', { intersect: false }, true);
      if (!elements.length) return;
      const idx = elements[0].index;

      chartList.forEach(target => {
        if (target === source) return;
        const active = target.data.datasets.map((_, di) => ({ datasetIndex: di, index: idx }));
        target.tooltip.setActiveElements(active, { x: 0, y: 0 });
        target.update('none');
      });
    });

    canvas.addEventListener('mouseleave', () => {
      chartList.forEach(target => {
        if (target === source) return;
        target.tooltip.setActiveElements([], { x: 0, y: 0 });
        target.update('none');
      });
    });
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   LOADING / STATUS UI
════════════════════════════════════════════════════════════════════════════ */
function setLoading(on) {
  const dot = document.getElementById('statusDot');
  const btn = document.getElementById('refreshBtn');
  dot.className = 'dot' + (on ? ' spin' : '');
  btn.disabled  = on;

  ['hBox','pBox','dBox'].forEach(id => {
    const box = document.getElementById(id);
    const existing = box.querySelector('.loading-overlay');
    if (on && !existing) {
      const ov = document.createElement('div');
      ov.className = 'loading-overlay';
      ov.innerHTML = '<div class="spinner"></div>';
      box.appendChild(ov);
    } else if (!on && existing) {
      existing.remove();
    }
  });
}

function setStatus(ok, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'dot' + (ok ? '' : ' err');
  txt.textContent = msg;
}

/* ════════════════════════════════════════════════════════════════════════════
   MAIN LOAD
════════════════════════════════════════════════════════════════════════════ */
async function load() {
  const stationId = document.getElementById('buoySel').value;
  const days      = parseInt(document.getElementById('daysSel').value, 10);
  const buoyName  = document.getElementById('buoySel').selectedOptions[0].text;

  setLoading(true);
  document.getElementById('statusTxt').textContent = `Loading buoy ${stationId}…`;

  try {
    const text = await fetchNDBC(stationId);
    const rows = parseNDBC(text, days);

    if (rows.length === 0) {
      throw new Error(`No data returned for buoy ${stationId} in the last ${days} day(s)`);
    }

    const data = buildData(rows);

    renderConditions(data);
    buildCharts(data);

    const lastTime = rows[rows.length - 1].time;
    const ago = Math.round((Date.now() - new Date(lastTime).getTime()) / 60000);
    setStatus(true, `${buoyName} · Last obs: ${ago} min ago · ${rows.length} hourly readings`);
  } catch (err) {
    console.error(err);
    setStatus(false, `Error: ${err.message}`);
  } finally {
    setLoading(false);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   EVENT HANDLERS
════════════════════════════════════════════════════════════════════════════ */
document.getElementById('buoySel').addEventListener('change', load);
document.getElementById('daysSel').addEventListener('change', load);
document.getElementById('refreshBtn').addEventListener('click', load);

/* ════════════════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════════════════ */
load();
</script>
