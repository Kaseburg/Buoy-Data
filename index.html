<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buoy Data — Swell Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #06001a;
      --bg-card:   #0d0030;
      --bg-chart:  #080020;
      --border:    #3a0060;
      --text:      #f0e6ff;
      --muted:     #9966cc;
      --accent:    #FF2D78;
      --ct:        #FFFFFF;
      --c1:        #00F5FF;
      --c2:        #FF2D78;
      --c3:        #39FF14;
      --cw:        #FFD600;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(0,245,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      color: var(--text);
      font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Navbar ─────────────────────────────────────────────────────── */
    .navbar {
      background: rgba(6, 0, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,245,255,0.12);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #00F5FF 0%, #FF2D78 50%, #FFD600 100%);
      opacity: .7;
    }

    .brand {
      font-family: 'Righteous', cursive;
      font-size: 22px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      text-decoration: none;
      background: linear-gradient(135deg, #00F5FF 0%, #FF2D78 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(0,245,255,0.45));
    }

    .brand-wave {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .brand-wave span {
      display: block;
      height: 2.5px;
      border-radius: 2px;
    }
    .brand-wave span:nth-child(1) { width: 22px; background: #00F5FF; box-shadow: 0 0 6px #00F5FF; transform: scaleX(.75); transform-origin: left; }
    .brand-wave span:nth-child(2) { width: 22px; background: #CC66FF; box-shadow: 0 0 6px #CC66FF; }
    .brand-wave span:nth-child(3) { width: 16px; background: #FF2D78; box-shadow: 0 0 6px #FF2D78; transform: scaleX(.65); transform-origin: left; }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .nav-label {
      font-size: 12px;
      color: var(--muted);
    }

    select, input[type="number"] {
      background: rgba(0,0,0,0.5);
      color: var(--text);
      border: 1px solid rgba(0,245,255,0.22);
      border-radius: 4px;
      padding: 5px 9px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #00F5FF;
      box-shadow: 0 0 10px rgba(0,245,255,0.35);
    }
    select option { background: #0d0030; }

    .btn {
      background: transparent;
      color: #FF2D78;
      border: 1.5px solid #FF2D78;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Exo 2', inherit;
      text-transform: uppercase;
      letter-spacing: .5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-shadow: 0 0 8px rgba(255,45,120,.7);
      box-shadow: 0 0 12px rgba(255,45,120,.3), inset 0 0 12px rgba(255,45,120,.05);
      transition: box-shadow .2s, background .2s;
    }
    .btn:hover {
      background: rgba(255,45,120,.12);
      box-shadow: 0 0 22px rgba(255,45,120,.6), inset 0 0 16px rgba(255,45,120,.1);
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Main ────────────────────────────────────────────────────────── */
    .main {
      max-width: 1360px;
      margin: 0 auto;
      padding: 20px 18px 32px;
    }

    /* ── Status bar ──────────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #39FF14;
      box-shadow: 0 0 8px #39FF14;
      flex-shrink: 0;
    }
    .dot.spin { background: #00F5FF; box-shadow: 0 0 10px #00F5FF; animation: blink 1s ease-in-out infinite; }
    .dot.err  { background: #FF2D78; box-shadow: 0 0 10px #FF2D78; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Conditions grid ─────────────────────────────────────────────── */
    .cond-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .cond-card {
      background: var(--bg-card);
      border: 1px solid rgba(180,100,255,0.18);
      border-left: 3px solid rgba(180,100,255,0.3);
      border-radius: 6px;
      padding: 12px 14px;
      transition: box-shadow .2s;
    }
    .cond-card:hover { box-shadow: 0 0 16px rgba(180,100,255,0.12); }

    .cond-card.ct { border-left-color: #FFFFFF; box-shadow: -2px 0 14px rgba(255,255,255,0.18); }

    .cond-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 5px;
      font-family: 'Righteous', cursive;
    }
    .cond-val {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .cond-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Swell composition table ─────────────────────────────────────── */
    .swell-table-wrap {
      background: var(--bg-card);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 6px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,245,255,0.04), inset 0 0 30px rgba(0,245,255,0.02);
    }

    .swell-table-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(0,245,255,0.1);
    }
    .swell-table-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: 'Righteous', cursive;
    }
    .swell-table-time {
      font-size: 11px;
      color: var(--muted);
    }

    .swell-table {
      width: 100%;
      border-collapse: collapse;
    }
    .swell-table th {
      text-align: left;
      padding: 7px 16px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: 'Righteous', cursive;
      border-bottom: 1px solid rgba(100,0,180,0.3);
      white-space: nowrap;
    }
    .swell-table th.right { text-align: right; }
    .swell-table td {
      padding: 8px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(100,0,180,0.15);
      white-space: nowrap;
    }
    .swell-table tr:last-child td { border-bottom: none; }
    .swell-table td.right { text-align: right; color: var(--muted); font-size: 12px; }

    .swell-table tr:hover td { background: rgba(0,245,255,0.03); }

    .comp-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .energy-bar-cell { width: 120px; }
    .energy-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .energy-bar-bg {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }
    .energy-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s;
    }
    .energy-pct {
      font-size: 11px;
      color: var(--muted);
      width: 34px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Charts ──────────────────────────────────────────────────────── */
    .chart-section { margin-bottom: 18px; }

    .chart-hdr {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 2px;
      margin-bottom: 6px;
    }
    .chart-title {
      font-family: 'Righteous', cursive;
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00F5FF;
      text-shadow: 0 0 12px rgba(0,245,255,0.5);
    }
    .chart-unit { font-size: 11px; color: var(--muted); }

    .chart-box {
      background: var(--bg-chart);
      border: 1px solid rgba(0,245,255,0.12);
      border-radius: 6px;
      padding: 14px 16px 10px;
      position: relative;
      height: 220px;
      box-shadow: 0 0 24px rgba(0,245,255,0.04), inset 0 0 40px rgba(0,0,50,0.4);
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6,0,26,.82);
      border-radius: 6px;
      z-index: 10;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2.5px solid rgba(0,245,255,0.15);
      border-top-color: #00F5FF;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      box-shadow: 0 0 14px rgba(0,245,255,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid rgba(0,245,255,0.1);
      margin-top: 8px;
    }
    footer a { color: #00F5FF; text-decoration: none; }
    footer a:hover { text-shadow: 0 0 8px #00F5FF; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      .navbar { padding: 8px 12px; }
      .main   { padding: 14px 10px 24px; }
      .cond-val { font-size: 18px; }
      .chart-box { height: 180px; }
      .energy-bar-cell { display: none; }
    }
  </style>
</head>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   CONFIG — NDBC station IDs mapped to lat/lon for Open-Meteo queries
════════════════════════════════════════════════════════════════════════════ */
const BUOYS = {
  '46026': { lat:  37.759, lon: -122.833 },
  '46012': { lat:  37.363, lon: -122.881 },
  '46011': { lat:  34.965, lon: -120.903 },

  '46054': { lat:  34.274, lon: -120.459 },

  '46221': { lat:  33.855, lon: -118.633 },
  '46041': { lat:  47.353, lon: -124.731 },
  '46029': { lat:  46.144, lon: -124.517 },
  '46050': { lat:  44.641, lon: -124.526 },
  '46015': { lat:  42.747, lon: -124.832 },
  '51001': { lat:  23.445, lon: -162.279 },
  '51002': { lat:  17.191, lon: -157.794 },
  '51003': { lat:  19.290, lon: -160.565 },
  '51004': { lat:  17.582, lon: -152.382 },
  '51101': { lat:  24.321, lon: -162.058 },
  '41025': { lat:  35.006, lon:  -75.402 },
  '41001': { lat:  34.700, lon:  -72.695 },
  '41002': { lat:  31.759, lon:  -74.948 },
  '44025': { lat:  40.251, lon:  -73.166 },
  '44017': { lat:  40.694, lon:  -72.048 },
  '44013': { lat:  42.346, lon:  -70.651 },
  '44008': { lat:  40.503, lon:  -69.247 },
  '44060': { lat:  37.248, lon:  -74.839 },
  '42036': { lat:  28.500, lon:  -94.046 },
  '42055': { lat:  22.017, lon:  -93.972 },
  '42001': { lat:  25.900, lon:  -89.658 },
};

const PAST_DAYS    = 3;
const MARINE_URL   = 'https://marine-api.open-meteo.com/v1/marine';
const FORECAST_URL = 'https://api.open-meteo.com/v1/forecast';

/* ════════════════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════════════════ */
let charts = { h: null, p: null, d: null };

/* ════════════════════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════════════════════ */
const mToFt   = v => (v == null || isNaN(v)) ? null : +(v * 3.28084).toFixed(2);
const cToF    = v => (v == null || isNaN(v)) ? null : +((v * 9 / 5) + 32).toFixed(1);
const hasData = arr => Array.isArray(arr) && arr.some(v => v != null);

function degToCompass(deg) {
  if (deg == null || isNaN(deg)) return '--';
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];
}

function utcTime(t) { return t.endsWith('Z') ? t : t + ':00Z'; }

function nowIndex(times) {
  const n = Date.now();
  for (let i = 0; i < times.length; i++) {
    if (new Date(utcTime(times[i])).getTime() >= n) return i;
  }
  return times.length - 1;
}

/* ════════════════════════════════════════════════════════════════════════════
   API
════════════════════════════════════════════════════════════════════════════ */
async function fetchMarine(lat, lon, forecastDays) {
  // swell_wave_height_2/_3 are only available for some locations/models.
  // past_days support varies by region.
  const base = [
    'wave_height','wave_period','wave_direction',
    'swell_wave_height','swell_wave_period','swell_wave_direction',
    'wind_wave_height','wind_wave_period','wind_wave_direction',
  ];
  const extended = [
    ...base,
    'swell_wave_height_2','swell_wave_period_2','swell_wave_direction_2',
    'swell_wave_height_3','swell_wave_period_3','swell_wave_direction_3',
  ];

  function buildUrl(vars, pastDays) {
    const past = pastDays > 0 ? `&past_days=${pastDays}` : '';
    return `${MARINE_URL}?latitude=${lat}&longitude=${lon}` +
           `&hourly=${vars.join(',')}&forecast_days=${forecastDays}${past}&timezone=GMT`;
  }

  // Try progressively simpler requests until one succeeds
  const attempts = [
    buildUrl([...extended, 'sea_surface_temperature'], PAST_DAYS),
    buildUrl(extended,                                 PAST_DAYS),
    buildUrl([...base, 'sea_surface_temperature'],     PAST_DAYS),
    buildUrl(base,                                     PAST_DAYS),
    buildUrl([...base, 'sea_surface_temperature'],     0),
    buildUrl(base,                                     0),
  ];
  for (const url of attempts) {
    const r = await fetch(url);
    if (r.ok) return r.json();
  }
  // All attempts failed — surface the last error
  const r = await fetch(attempts[attempts.length - 1]);
  const errText = await r.text().catch(() => '');
  throw new Error(`Marine API ${r.status}: ${errText}`);
}

async function fetchWeather(lat, lon, forecastDays) {
  const u = new URL(FORECAST_URL);
  u.searchParams.set('latitude',         lat);
  u.searchParams.set('longitude',        lon);
  u.searchParams.set('hourly',           'temperature_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m');
  u.searchParams.set('past_days',        PAST_DAYS);
  u.searchParams.set('forecast_days',    forecastDays);
  u.searchParams.set('timezone',         'GMT');
  u.searchParams.set('temperature_unit', 'fahrenheit');
  u.searchParams.set('wind_speed_unit',  'mph');

  const r = await fetch(u);
  if (!r.ok) throw new Error(`Weather API ${r.status}`);
  return r.json();
}

/* ════════════════════════════════════════════════════════════════════════════
   DATA PROCESSING
════════════════════════════════════════════════════════════════════════════ */
function process(marine, weather) {
  const m = marine.hourly;
  const w = weather.hourly;
  const times = m.time;
  const ni    = nowIndex(times);

  // Total wave (height in ft, period in s, direction in °)
  const wvht = m.wave_height?.map(mToFt)  || null;
  const wvp  = m.wave_period              || null;
  const wvd  = m.wave_direction           || null;

  // Swell components (for table only — not charted)
  const s1h  = m.swell_wave_height?.map(mToFt)     || null;
  const s1p  = m.swell_wave_period                 || null;
  const s1d  = m.swell_wave_direction              || null;
  const s2h  = m.swell_wave_height_2?.map(mToFt)   || null;
  const s2p  = m.swell_wave_period_2               || null;
  const s2d  = m.swell_wave_direction_2            || null;
  const s3h  = m.swell_wave_height_3?.map(mToFt)   || null;
  const s3p  = m.swell_wave_period_3               || null;
  const s3d  = m.swell_wave_direction_3            || null;
  const wwh  = m.wind_wave_height?.map(mToFt)      || null;
  const wwp  = m.wind_wave_period                  || null;
  const wwd  = m.wind_wave_direction               || null;

  // Weather
  const sst     = m.sea_surface_temperature?.map(cToF) || null;
  const airTemp = w.temperature_2m     || null;
  const windSpd = w.wind_speed_10m     || null;
  const windDir = w.wind_direction_10m || null;
  const windGst = w.wind_gusts_10m     || null;

  // Current snapshot
  const cur = {
    wvht: wvht?.[ni], wvp: wvp?.[ni], wvd: wvd?.[ni],
    s1h:  s1h?.[ni],  s1p: s1p?.[ni], s1d: s1d?.[ni],
    s2h:  s2h?.[ni],  s2p: s2p?.[ni], s2d: s2d?.[ni],
    s3h:  s3h?.[ni],  s3p: s3p?.[ni], s3d: s3d?.[ni],
    wwh:  wwh?.[ni],  wwp: wwp?.[ni], wwd: wwd?.[ni],
    sst:     sst?.[ni],
    airTemp: airTemp?.[ni],
    windSpd: windSpd?.[ni],
    windDir: windDir?.[ni],
    windGst: windGst?.[ni],
  };

  return {
    times, ni,
    nowStr: utcTime(times[ni]),
    // chart data
    wvht, wvp, wvd,
    // swell component data (for table)
    s1h, s1p, s1d,
    s2h, s2p, s2d,
    s3h, s3p, s3d,
    wwh, wwp, wwd,
    sst, airTemp, windSpd, windDir, windGst,
    cur,
    hasPast: times.length > 0 && new Date(utcTime(times[0])).getTime() < Date.now() - 3600_000,
    availability: {
      swell1: hasData(s1h) || hasData(s1p) || hasData(s1d),
      swell2: hasData(s2h) || hasData(s2p) || hasData(s2d),
      swell3: hasData(s3h) || hasData(s3p) || hasData(s3d),
      wind:   hasData(wwh) || hasData(wwp) || hasData(wwd),
    },
  };
}

/* ════════════════════════════════════════════════════════════════════════════
   CONDITIONS PANEL
════════════════════════════════════════════════════════════════════════════ */
function renderConditions(d) {
  const { cur } = d;

  function card(cls, label, value, sub) {
    return `<div class="cond-card ${cls}">
      <div class="cond-lbl">${label}</div>
      <div class="cond-val">${value}</div>
      ${sub ? `<div class="cond-sub">${sub}</div>` : ''}
    </div>`;
  }

  const fh = v => v != null ? `${v.toFixed(1)} ft` : '--';
  const fp = v => v != null ? `${v.toFixed(0)}s`   : '--';
  const fd = v => v != null ? `${degToCompass(v)} (${Math.round(v)}°)` : '--';

  let html = '';

  html += card('ct', 'Total Wave',
    fh(cur.wvht),
    [cur.wvp != null ? fp(cur.wvp) : null, cur.wvd != null ? `from ${fd(cur.wvd)}` : null].filter(Boolean).join(' · ')
  );

  html += card('', 'Wind',
    cur.windSpd != null ? `${cur.windSpd.toFixed(0)} mph` : '--',
    [
      cur.windDir != null ? `from ${degToCompass(cur.windDir)}` : '',
      cur.windGst != null ? `gusts ${cur.windGst.toFixed(0)} mph` : '',
    ].filter(Boolean).join(' · ')
  );

  if (hasData(d.sst)) {
    html += card('', 'Water Temp', cur.sst != null ? `${cur.sst.toFixed(1)}°F` : '--', '');
  }

  html += card('', 'Air Temp', cur.airTemp != null ? `${cur.airTemp.toFixed(1)}°F` : '--', '');

  document.getElementById('condGrid').innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════════════════
   SWELL COMPOSITION TABLE
════════════════════════════════════════════════════════════════════════════ */
function renderSwellTable(d) {
  const { cur, availability, nowStr } = d;

  // Format the "as of" time
  const asOf = new Date(nowStr).toLocaleString('en-US', {
    timeZone: 'UTC', hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
  });
  document.getElementById('swellTableTime').textContent = `as of ${asOf}`;

  // Build component rows: [label, color, height_ft, period_s, direction_deg]
  const rows = [];

  if (cur.s1h != null || cur.s1p != null || cur.s1d != null) {
    rows.push({ label: 'Swell 1',    color: '#00F5FF', h: cur.s1h, p: cur.s1p, d: cur.s1d });
  }
  if (availability.swell2 && (cur.s2h != null || cur.s2p != null || cur.s2d != null)) {
    rows.push({ label: 'Swell 2',    color: '#FF2D78', h: cur.s2h, p: cur.s2p, d: cur.s2d });
  }
  if (availability.swell3 && (cur.s3h != null || cur.s3p != null || cur.s3d != null)) {
    rows.push({ label: 'Swell 3',    color: '#39FF14', h: cur.s3h, p: cur.s3p, d: cur.s3d });
  }
  if (availability.wind && (cur.wwh != null || cur.wwp != null || cur.wwd != null)) {
    rows.push({ label: 'Wind Waves', color: '#FFD600', h: cur.wwh, p: cur.wwp, d: cur.wwd });
  }

  // Wave energy is proportional to H²; compute relative % for each component
  const totalEnergy = rows.reduce((sum, r) => sum + (r.h != null ? r.h * r.h : 0), 0);

  const fh = v => v != null ? `${v.toFixed(1)} ft` : '<span style="color:var(--muted)">--</span>';
  const fp = v => v != null ? `${v.toFixed(0)}s`   : '<span style="color:var(--muted)">--</span>';
  const fd = v => v != null
    ? `${degToCompass(v)}&nbsp;<span style="color:var(--muted)">${Math.round(v)}°</span>`
    : '<span style="color:var(--muted)">--</span>';

  function energyCell(h) {
    if (h == null || totalEnergy === 0) {
      return `<td class="right energy-bar-cell">--</td>`;
    }
    const pct = Math.round((h * h / totalEnergy) * 100);
    return `<td class="energy-bar-cell">
      <div class="energy-bar-wrap">
        <div class="energy-bar-bg">
          <div class="energy-bar-fill" style="width:${pct}%;background:${rows.find(r=>r.h===h)?.color||'#fff'}"></div>
        </div>
        <span class="energy-pct">${pct}%</span>
      </div>
    </td>`;
  }

  if (rows.length === 0) {
    document.getElementById('swellTableBody').innerHTML =
      `<tr><td colspan="5" style="color:var(--muted);padding:12px 16px">No component data available for this location.</td></tr>`;
    return;
  }

  const tbodyHtml = rows.map(row => {
    const pct = (row.h != null && totalEnergy > 0)
      ? Math.round((row.h * row.h / totalEnergy) * 100) : null;
    const barPct = pct ?? 0;
    return `<tr>
      <td>
        <span class="comp-dot" style="background:${row.color};box-shadow:0 0 6px ${row.color}"></span>
        ${row.label}
      </td>
      <td>${fh(row.h)}</td>
      <td>${fp(row.p)}</td>
      <td>${fd(row.d)}</td>
      <td class="energy-bar-cell">
        <div class="energy-bar-wrap">
          <div class="energy-bar-bg">
            <div class="energy-bar-fill" style="width:${barPct}%;background:${row.color}"></div>
          </div>
          <span class="energy-pct">${pct != null ? pct + '%' : '--'}</span>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('swellTableBody').innerHTML = tbodyHtml;
}

/* ════════════════════════════════════════════════════════════════════════════
   CHART BUILDING
════════════════════════════════════════════════════════════════════════════ */
function pts(times, arr) {
  if (!arr) return [];
  return times.map((t, i) => ({ x: utcTime(t), y: arr[i] }));
}

function ds(label, data, color) {
  return {
    label, data,
    borderColor:               color,
    backgroundColor:           color + '20',
    borderWidth:               2.5,
    pointRadius:               0,
    pointHoverRadius:          5,
    pointHoverBackgroundColor: color,
    pointHoverBorderColor:     '#fff',
    pointHoverBorderWidth:     1,
    tension:                   0.35,
    spanGaps:                  true,
    fill:                      false,
  };
}

function baseOptions(nowStr, yExtra, tooltipLabel) {
  return {
    responsive:          true,
    maintainAspectRatio: false,
    animation:           { duration: 400 },
    interaction:         { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(6,0,26,0.97)',
        borderColor:     'rgba(0,245,255,0.35)',
        borderWidth:     1,
        titleColor:      '#00F5FF',
        bodyColor:       '#c0a0ff',
        padding:         10,
        callbacks: {
          title(ctx) {
            if (!ctx.length) return '';
            const raw = ctx[0].raw;
            if (raw?.x) {
              return new Date(raw.x).toLocaleString('en-US', {
                timeZone: 'UTC',
                weekday: 'short', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
              });
            }
            return ctx[0].label || '';
          },
          label: tooltipLabel,
        },
      },
      annotation: {
        annotations: {
          nowLine: {
            type:        'line',
            xMin:        nowStr,
            xMax:        nowStr,
            borderColor: 'rgba(255,45,120,.65)',
            borderWidth: 1.5,
            borderDash:  [5, 4],
            label: {
              content:         'NOW',
              display:         true,
              position:        'start',
              backgroundColor: 'rgba(255,45,120,.18)',
              color:           '#FF2D78',
              font:            { size: 9, weight: 'bold', family: "'Righteous', cursive" },
              padding:         { x: 5, y: 3 },
            },
          },
        },
      },
    },
    scales: {
      x: {
        type: 'time',
        time: {
          tooltipFormat:  'MMM d, HH:mm',
          displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d' },
        },
        grid:  { color: 'rgba(100,0,180,0.28)' },
        ticks: { color: '#9966cc', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
      },
      y: {
        grid:  { color: 'rgba(100,0,180,0.28)' },
        ticks: { color: '#9966cc' },
        ...yExtra,
      },
    },
  };
}

function buildCharts(d) {
  const { times, nowStr } = d;

  Object.values(charts).forEach(c => c && c.destroy());

  // ── Height chart (total wave only) ────────────────────────────────────────
  charts.h = new Chart(document.getElementById('hChart'), {
    type: 'line',
    data: { datasets: [ds('Wave Height', pts(times, d.wvht), '#FFFFFF')] },
    options: baseOptions(nowStr, {
      beginAtZero: true,
      ticks: { color: '#9966cc', callback: v => `${v} ft` },
    }, ctx => {
      const v = ctx.raw?.y;
      return v == null ? null : `${v.toFixed(1)} ft`;
    }),
  });

  // ── Period chart (total wave only) ────────────────────────────────────────
  charts.p = new Chart(document.getElementById('pChart'), {
    type: 'line',
    data: { datasets: [ds('Wave Period', pts(times, d.wvp), '#00F5FF')] },
    options: baseOptions(nowStr, {
      beginAtZero: true,
      ticks: { color: '#9966cc', callback: v => `${v}s` },
    }, ctx => {
      const v = ctx.raw?.y;
      return v == null ? null : `${v.toFixed(0)}s`;
    }),
  });

  // ── Direction chart (total wave only) ─────────────────────────────────────
  const COMPASS = { 0:'N', 45:'NE', 90:'E', 135:'SE', 180:'S', 225:'SW', 270:'W', 315:'NW', 360:'N' };

  charts.d = new Chart(document.getElementById('dChart'), {
    type: 'line',
    data: { datasets: [ds('Wave Direction', pts(times, d.wvd), '#FFD600')] },
    options: baseOptions(nowStr, {
      min: 0, max: 360,
      ticks: {
        color: '#9966cc', stepSize: 45,
        callback: v => COMPASS[v] !== undefined ? `${COMPASS[v]} ${v}°` : `${v}°`,
      },
    }, ctx => {
      const v = ctx.raw?.y;
      if (v == null) return null;
      const deg = Math.round(((v % 360) + 360) % 360);
      return `${deg}° (${degToCompass(deg)})`;
    }),
  });

  syncCrosshair([charts.h, charts.p, charts.d]);
}

/* ════════════════════════════════════════════════════════════════════════════
   CROSSHAIR SYNC
════════════════════════════════════════════════════════════════════════════ */
function syncCrosshair(chartList) {
  chartList.forEach(source => {
    source.canvas.addEventListener('mousemove', evt => {
      const els = source.getElementsAtEventForMode(evt, 'index', { intersect: false }, true);
      if (!els.length) return;
      const idx = els[0].index;
      chartList.forEach(target => {
        if (target === source) return;
        target.tooltip.setActiveElements(
          target.data.datasets.map((_, di) => ({ datasetIndex: di, index: idx })),
          { x: 0, y: 0 }
        );
        target.update('none');
      });
    });

    source.canvas.addEventListener('mouseleave', () => {
      chartList.forEach(target => {
        if (target === source) return;
        target.tooltip.setActiveElements([], { x: 0, y: 0 });
        target.update('none');
      });
    });
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   LOADING / STATUS UI
════════════════════════════════════════════════════════════════════════════ */
function setLoading(on) {
  document.getElementById('statusDot').className = 'dot' + (on ? ' spin' : '');
  document.getElementById('refreshBtn').disabled = on;
  ['hBox','pBox','dBox'].forEach(id => {
    const box = document.getElementById(id);
    const existing = box.querySelector('.loading-overlay');
    if (on && !existing) {
      const ov = document.createElement('div');
      ov.className = 'loading-overlay';
      ov.innerHTML = '<div class="spinner"></div>';
      box.appendChild(ov);
    } else if (!on && existing) {
      existing.remove();
    }
  });
}

function setStatus(ok, msg) {
  document.getElementById('statusDot').className = 'dot' + (ok ? '' : ' err');
  document.getElementById('statusTxt').textContent = msg;
}

/* ════════════════════════════════════════════════════════════════════════════
   MAIN LOAD
════════════════════════════════════════════════════════════════════════════ */
async function load() {
  const stationId = document.getElementById('buoySel').value;
  const days      = parseInt(document.getElementById('daysSel').value, 10);
  const buoyName  = document.getElementById('buoySel').selectedOptions[0].text;
  const { lat, lon } = BUOYS[stationId];

  setLoading(true);
  document.getElementById('statusTxt').textContent = `Loading ${buoyName}…`;

  try {
    const [marine, weather] = await Promise.all([
      fetchMarine(lat, lon, days),
      fetchWeather(lat, lon, days),
    ]);

    const data = process(marine, weather);

    renderConditions(data);
    renderSwellTable(data);
    buildCharts(data);

    // Update chart subtitle to reflect actual history available
    const histLabel = data.hasPast ? `${PAST_DAYS} days history + ` : '';
    document.getElementById('hUnit').textContent = `feet (ft) · ${histLabel}forecast`;

    setStatus(true, `${buoyName} · Updated ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus(false, `Error: ${err.message}`);
  } finally {
    setLoading(false);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   EVENT HANDLERS + INIT
════════════════════════════════════════════════════════════════════════════ */
document.getElementById('buoySel').addEventListener('change', load);
document.getElementById('daysSel').addEventListener('change', load);
document.getElementById('refreshBtn').addEventListener('click', load);

load();
</script>
